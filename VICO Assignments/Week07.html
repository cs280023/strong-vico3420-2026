<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 7</title>
</head>
<body>
   
    <style>
        body {
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans';
            text-align: center;
            background-color: rgb(0, 0, 0);
            color: white;
        }
        
        #chSheet {
            border-radius: 10px;
            margin: 20px auto;
            width: 50%;
            padding: 20px;
        }
    </style>

    <h1> Superhero Creator</h1>
    <p> Welcome to my Super Creator! Here, you'll pick various attributes to create a unique superhero (or villain!)</p>

    <form id="contactForm" action="" method="get">
        <div id="heroNameText">
            <label for="heroName"><h4>What's your Super Name? </h4></label>
        </div><br>

        <div id="powersCheck">
            <label><h4>Pick up to 3 Super Powers: </h4></label>
        </div><br>

        <div id="colorForm">
            <label><h4>Favorite Color: </h4></label>
        </div><br>
    
        <div id="idealDropDown">
            <label for="ideals"><h4>Choose your Ideal: </h4></label>
            <select id="ideals" name="ideals"></select>
        </div><br>

        <div id="alignmentForm">
            <label><h4>Choose your Alignment: </h4></label>
        </div><br>

        <button type="submit" value="submit" id="submitButton" onclick = "characterSheet()">Submit</button><br>

        <div id="chSheet"></div>
        <div id = "footer">
            <p>Website Created by Caleb Strong</p>
            <p>All rights reserved</p>
        </div>
        
    </form>

    <script type="application/javascript">

        document.getElementById("submitButton").addEventListener("click", function(event){event.preventDefault()});

        let chSheet = document.getElementById("chSheet");

        //RESULTS FUNCTION
        function characterSheet(){
            chSheet.innerHTML = "";

            if (colorChoice() == "" || alignmentChoice() == "" || heroName.value == ""){
            document.getElementById("chSheet").style.backgroundColor = "white";
            document.getElementById("chSheet").style.color = "black";
            chSheet.innerHTML += "<p>Please finish filling out the full form</p>";
            }

            else{
                chSheet.innerHTML += "<h4>Here is your Super Creation!</h4>";
                whatIsYourSuperHero(heroName.value);
                checkBoxResults();
                chSheet.innerHTML += "<p>Your Favorite Color is: " + colorChoice() + "</p>";
                chSheet.innerHTML += "<p>You are a: " + alignmentChoice() + "</p>";
                idealText(idealList, idealCall);
                chSheet.innerHTML += "<h3>Thank you for using the Super Creator!</h3>";


                document.getElementById("chSheet").style.backgroundColor = colorChoice();

                if (colorChoice() == "Black"){
                    document.body.style.backgroundColor = "white";
                    document.body.style.color = "black";
                }
                else {
                    document.body.style.backgroundColor = "black";
                    document.body.style.color = "white";
                }

                switch (colorChoice()) {
                    case "Red":
                        document.getElementById("chSheet").style.color = "white";
                        break;
                    case "Blue":
                        document.getElementById("chSheet").style.color = "white";
                        break;
                    case "Black":
                        document.getElementById("chSheet").style.color = "white";
                        break;
                    case "Purple":
                        document.getElementById("chSheet").style.color = "white";
                        break;
                    default:
                        document.getElementById("chSheet").style.color = "black";
                }
            }
        }
        //HERO NAME FUNCTION
        function whatIsYourSuperHero(x) { 
            chSheet.innerHTML += "<p>Your Super Name is: " + x + "<br></p>";
        }
  
        //POWERS FUNCTION
        function checkBoxResults() {
            let x = [];
            let checkBoxGroup;
            for (let i = 0; i < powerList.length; i++){
                checkBoxGroup = document.getElementsByClassName("power"); 
                if (checkBoxGroup[i].checked == true){
                    x.push(checkBoxGroup[i].value); 
                }            
            } 
            chSheet.innerHTML += "<p>Your Powers are: " + x + "</p>"; 
        }
        
        //COLOR FUNCTION
        function colorChoice() {
            let color;
            let x = "";
            for (let i = 0; i < colors.length; i++){
                color = document.getElementById("colorForm").getElementsByTagName("input");
                if (color[i].checked == true){
                    x = (color[i].value);
                }
            }
           return x;
        }

         //ALIGNMENT FUNCTION
        function alignmentChoice() {
            let alignment;
            let x = "";
            for (let i = 0; i < alignLi.length; i++){
                alignment = document.getElementById("alignmentForm").getElementsByTagName("input");
                if (alignment[i].checked == true){
                    x = (alignment[i].value);
                }
            }
            return x;
        }

        //IDEALS FUNCTION 
        function idealText(x,z){
            let v = "";
            let w = "";
            for (let i = 0; i < x.length; i++){
                if (z[i].selected== true){
                    v = z.value;
                    w = x[i][1];
                    chSheet.innerHTML += "<p> Your Ideal is: " + v + "</p>";
                    chSheet.innerHTML += "<p>" + w + "</p>";
                }
            }    
        }

        //This is not my code, it was found on line but modified by me, so don't count it as mine for grading purposes. However, I will comment to show my understanding.
        function CheckBoxLimits() { //declares function
            let checkboxgroup = document.getElementById('powersCheck').getElementsByTagName("input"); //sets checkboxgroup as the variable for the html checkbox form
            let limit = 3; // declares a limit of 3
            for (let i = 0; i < checkboxgroup.length; i++) { //i is 0, if i is less than the amount of checkboxes, run the code, add 1 to i.
                checkboxgroup[i].onclick = function() { //nests a function within this function whenever a checkbox is clicked
                    let checkcount = 0; //new counter variable
                        for (let i = 0; i < checkboxgroup.length; i++) { 
                        checkcount += (checkboxgroup[i].checked) ? 1 : 0; // this one im still a little unsure on, but generally it increases the counter the more checkboxes are checked
                    }
                    if (checkcount > limit) { // if counter is greater than the limit, run the code
                        alert("You can select maximum of " + limit + " checkbox."); //pops up a web alert saying you can't check more
                        this.checked = false; // sets newest checked box to false
                    }
                }
            }
        } 

        //HERO NAME SECTION
        let SuperName = document.getElementById("heroNameText"); //textform
        SuperName.innerHTML += `<input type="text" id="heroName" name="heroName" placeholder = "Super Name Here...">`;

        //POWERS SECTION
        let powers = document.getElementById("powersCheck"); //Checkboxes
        let powerList = [ " Flight", " Super Strength", " Invisibility", " Telepathy", " Super Speed", " Telekinesis", 
            " Shape Shifting", " Time Manipulation", " Energy Projection", " Healing Factor", " Super Intelligence", 
            " Elemental Control", " Size Manipulation", " Force Fields", " Laser Vision", " Immortality" ];
        for (let y in powerList){
            powers.innerHTML += 
                `<label for="powerList">${powerList[y]}</label>
                <input type = "checkbox" id = "powerList" class = "power" name = "power[${y}]" value = "${powerList[y]}">
                <br>`;
                CheckBoxLimits();
        }

        //COLORS SECTION
        let colorform = document.getElementById("colorForm"); //Radio Buttons
        let colors = ["Red", "Orange", "Yellow", "Blue", "Green", "Purple", "Pink", "Black", "White"];
        for (let x in colors){
            colorform.innerHTML += 
                `<input type="radio" id="${colors[x]}" name="color" value="${colors[x]}">
                <label for="${colors[x]}">${colors[x]}</label><br>`;
        }

        //IDEALS SECTION
        let idealCall = document.getElementById("ideals");
        let ideals = document.getElementById('idealDropDown').getElementsByTagName("select")[0]; //Dropdown Menu
        let idealList = [
            ["Justice", "You wish to protect the innocent because it is right."],
            ["Freedom", "You value autonomy and liberation, protecting that right for yourself and others."],
            ["Power", "Your only goal is to be stronger, stronger than anyone else."],
            ["Knowledge", "You seek to understand the mysteries of the universe."],
            ["Peace", "You desire no more violence, just tranquility, but you will do what you must to achieve it."],
            ["Love", "You do the actions you do because you know someone you care for deeply that you want to protect."],
            ["Revenge", "You lost someone or something close to you, and you seek to avenge that loss."],
            ["Rage", "You are consumed by anger, and there is minimal thought to anything else."],
            ["Money", "You do what you must all for financial gain, because what is happiness without money."]
        ];
        for (let x = 0; x < idealList.length; x++){
            ideals.innerHTML +=
                `<option value="${idealList[x][0]}">${idealList[x][0]}</option>`;
        }

        //ALIGNMENT SECTION
        let alignment = document.getElementById("alignmentForm"); //Radio Buttons
        let alignLi = ["Hero", "Villain", "Anti-Hero", "Vigilante", "Civilian"];
        for (let x in alignLi){
            alignment.innerHTML += 
                `<input type="radio" id="${alignLi[x]}" name="alignment" value="${alignLi[x]}">
                <label for="${alignLi[x]}">${alignLi[x]}</label><br>`;
        }

    </script>
    
</body>
</html>
